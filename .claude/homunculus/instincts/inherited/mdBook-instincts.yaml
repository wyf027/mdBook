# MdBook Workflow Version Bump Release

## Action

Follow the version-bump-release workflow:
1. Update the version number in Cargo.toml files for all crates.
2. Update the root Cargo.toml and Cargo.lock.
3. Update the CHANGELOG.md with release notes.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: CHANGELOG.md, Cargo.lock, Cargo.toml

